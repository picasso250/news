services:
  - type: web
    name: news-xyz
    runtime: static
    # Build command updates markets and generates the HTML
    buildCommand: pip install -r requirements.txt && python update_markets.py && python iran_news_gen.py && cp iran-news-zh.html index.html
    staticPublishPath: ./

  - type: cron
    name: update-polymarket
    env: python
    schedule: "0 * * * *" # Hourly
    buildCommand: pip install -r requirements.txt
    # Update markets and then you might want to trigger a redeploy of the static site
    # via a deploy hook if you have one set up.
    startCommand: python update_markets.py && python iran_news_gen.py
